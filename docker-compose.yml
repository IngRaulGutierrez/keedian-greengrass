version: "3.8"

services:
  greengrass:
    build: ./greengrass-core
    container_name: greengrass-core
    init: true
    volumes:
      - ./config:/tmp/certs:ro
      - ./components:/tmp/components:ro
      - greengrass-root:/greengrass/v2
    env_file:
      - .env
    ports:
      - "8883:8883"
    restart: unless-stopped

volumes:
  greengrass-root:
